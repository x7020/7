name: Build DouyinLite ProductLooper v4 Universal dylib

on:
  workflow_dispatch:
  push:
    paths:
      - 'ProductLooper.m'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build arm64 and arm64e universal dylib
        shell: bash
        run: |
          set -euxo pipefail
          SDK="$(xcrun --sdk iphoneos --show-sdk-path)"
          COMMON=(
            -isysroot "$SDK"
            -miphoneos-version-min=14.0
            -fobjc-arc
            -fblocks
            -fmodules
            -O2
            -dynamiclib
            -framework UIKit
            -framework Foundation
            -framework QuartzCore
            -install_name '@rpath/DouyinLiteProductLooper.dylib'
            ProductLooper.m
          )

          xcrun clang -arch arm64 "${COMMON[@]}" -o ProductLooper-arm64.dylib
          xcrun clang -arch arm64e "${COMMON[@]}" -o ProductLooper-arm64e.dylib

          xcrun lipo -create             ProductLooper-arm64.dylib             ProductLooper-arm64e.dylib             -output DouyinLiteProductLooper.dylib

          codesign --force --sign - DouyinLiteProductLooper.dylib
          file DouyinLiteProductLooper.dylib
          xcrun lipo -info DouyinLiteProductLooper.dylib
          shasum -a 256 DouyinLiteProductLooper.dylib | tee DouyinLiteProductLooper.sha256

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: DouyinLiteProductLooper-v4-Universal
          path: |
            DouyinLiteProductLooper.dylib
            DouyinLiteProductLooper.sha256
